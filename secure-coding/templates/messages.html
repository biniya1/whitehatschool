{% extends "base.html" %}
{% block title %}메시지함{% endblock %}
{% block content %}
<h2>메시지함</h2>
<ul>
  {% for partner in partners %}
    <li><a href="{{ url_for('chat.dm_thread', peer_id=partner.id) }}">{{ partner.username }}</a></li>
  {% else %}
    <li class="muted">대화 내역이 없습니다. 상품/사용자 페이지에서 1:1 채팅을 시작해보세요.</li>
  {% endfor %}
</ul>
{% endblock %}
