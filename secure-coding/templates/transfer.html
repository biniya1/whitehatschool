{% extends "base.html" %}
{% from "_macros.html" import render_field %}
{% block title %}송금{% endblock %}
{% block content %}
<h2>송금</h2>
<p>현재 잔액: {{ user.balance }}원</p>
<form method="post" novalidate>
  {{ form.hidden_tag() }}
  {{ render_field(form.target_username) }}
  {{ render_field(form.amount) }}
  <button type="submit">송금하기</button>
</form>
{% endblock %}
